name: brandfactory-dev

services:
  postgres:
    image: postgres:16
    container_name: brandfactory-postgres
    environment:
      POSTGRES_USER: brandfactory
      POSTGRES_PASSWORD: brandfactory
      POSTGRES_DB: brandfactory
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U brandfactory -d brandfactory']
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
